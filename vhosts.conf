# ============================================================
# BookRatings — Apache VirtualHost для WampServer
#
# ІНСТРУКЦІЯ:
#
# 1. Скопіюйте цей файл або додайте вміст до:
#    C:\wamp64\bin\apache\apache2.4.x\conf\extra\httpd-vhosts.conf
#
# 2. Відредагуйте DocumentRoot та Directory — вкажіть шлях до проєкту.
#
# 3. Додайте рядок у C:\Windows\System32\drivers\etc\hosts
#    (відкрити Notepad як адміністратор):
#    127.0.0.1    book-rating.io
#    127.0.0.1    test-book.io
#
# 4. Перезапустіть WampServer.
#
# 5. Відкрийте http://book-rating.io у браузері.
# ============================================================

# ── Збереження доступу до http://localhost ─────────────────
<VirtualHost *:80>
    ServerName localhost
    DocumentRoot "C:/wamp64/www"
    <Directory "C:/wamp64/www">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# ── book-rating.io ─────────────────────────────────────────
<VirtualHost *:80>
    ServerName book-rating.io
    ServerAlias www.book-rating.io

    # Змініть шлях на вашу папку з проєктом
    DocumentRoot "C:/wamp64/www/book-rating.io"

    <Directory "C:/wamp64/www/book-rating.io">
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "C:/wamp64/logs/book-rating-error.log"
    CustomLog "C:/wamp64/logs/book-rating-access.log" combined
</VirtualHost>

# ── test-book.io (другий домен для того ж проєкту) ────────
<VirtualHost *:80>
    ServerName test-book.io
    ServerAlias www.test-book.io

    DocumentRoot "C:/wamp64/www/book-rating.io"

    <Directory "C:/wamp64/www/book-rating.io">
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# ── Шаблон для нового домену ───────────────────────────────
# Скопіюйте блок нижче і замініть ServerName на ваш домен:
#
# <VirtualHost *:80>
#     ServerName mybooks.local
#     DocumentRoot "C:/wamp64/www/book-rating.io"
#     <Directory "C:/wamp64/www/book-rating.io">
#         Options FollowSymLinks
#         AllowOverride All
#         Require all granted
#     </Directory>
# </VirtualHost>
